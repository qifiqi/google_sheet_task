{% extends "admin/base.html" %}

{% block title %}回测任务详情{% endblock %}

{% block head %}
<style>
    .detail-card { border: none; border-radius: 1rem; box-shadow: 0 4px 16px rgba(0,0,0,0.03); overflow: hidden; }
    .detail-header { background: #f8fafc; padding: 1.5rem; border-bottom: 1px solid #edf2f7; }
    
    .meta-label { color: #64748b; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .meta-value { color: #0f172a; font-weight: 600; font-size: 1rem; }
    
    .param-table th { background: #f8fafc; color: #475569; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
    .param-table td { vertical-align: middle; color: #334155; }
    
    .status-badge { padding: 0.4rem 0.8rem; border-radius: 6px; font-weight: 600; font-size: 0.8rem; }
</style>
{% endblock %}

{% block content %}
<div class="pt-3 pb-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 fw-bold mb-1 text-dark">任务详情</h1>
            <div class="text-muted d-flex align-items-center gap-2">
                <span>Task ID: <code class="bg-light px-2 py-1 rounded text-primary fs-6" id="taskIdText">{{ task_id }}</code></span>
            </div>
        </div>
        <a href="/backtest-training/list" class="btn btn-light rounded-pill px-4 shadow-sm border">
            <i class="bi bi-arrow-left"></i> 返回列表
        </a>
    </div>

    <div class="card detail-card mb-4">
        <div class="detail-header">
            <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-info-circle text-primary me-2"></i>基础执行信息</h5>
        </div>
        <div class="card-body p-4">
            <div class="row g-4">
                <div class="col-md-3">
                    <div class="meta-label">当前状态</div>
                    <div class="meta-value" id="taskStatus"></div>
                </div>
                <div class="col-md-3">
                    <div class="meta-label">创建时间</div>
                    <div class="meta-value" id="taskCreated"><span class="text-muted placeholder col-6"></span></div>
                </div>
                <div class="col-md-3">
                    <div class="meta-label">开始执行时间</div>
                    <div class="meta-value" id="taskStart"><span class="text-muted placeholder col-6"></span></div>
                </div>
                <div class="col-md-3">
                    <div class="meta-label">结束时间</div>
                    <div class="meta-value" id="taskEnd"><span class="text-muted placeholder col-6"></span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card detail-card mb-4">
        <div class="detail-header">
            <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-sliders text-success me-2"></i>任务输入参数</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0 param-table" id="taskParamTable">
                <thead id="taskParamHead"></thead>
                <tbody id="taskParamBody"></tbody>
            </table>
        </div>
    </div>

    <div class="card detail-card mb-4">
        <div class="detail-header d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-bold text-dark"><i class="bi bi-clipboard-data text-warning me-2"></i>回测生成结果 (Sub-tasks)</h5>
        </div>
        <div class="table-responsive">
            <table class="table table-hover mb-0 param-table">
                <thead>
                    <tr>
                        <th class="ps-4">结果 ID</th>
                        <th>执行参数</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th class="pe-4 text-end">操作</th>
                    </tr>
                </thead>
                <tbody id="subTaskTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
