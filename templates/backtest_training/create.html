{% extends "admin/base.html" %}

{% block title %}创建回测数据训练任务{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">创建回测数据训练任务</h1>
</div>

<div class="card mb-3">
    <div class="card-header">
        <h5 class="mb-0">模型输入</h5>
    </div>
    <div class="card-body">
        <div class="row g-2 align-items-end mb-3">
            <div class="col-md-8">
                <label class="form-label">模型 URL</label>
                <input type="text" class="form-control" id="modelUrl" placeholder="输入 Google Sheet URL">
            </div>
            <div class="col-md-4">
                <button type="button" class="btn btn-secondary me-2" id="analyzeBtn">
                    <i class="bi bi-search"></i> 分析
                </button>
                <button type="button" class="btn btn-primary" id="createBtn">
                    <i class="bi bi-plus-circle"></i> 创建
                </button>
            </div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-md-6">
                <label class="form-label">任务名称</label>
                <input type="text" class="form-control" id="taskName" placeholder="输入任务名称">
            </div>
            <div class="col-md-6">
                <label class="form-label">股票代码</label>
                <input type="text" class="form-control" id="stockCode" placeholder="输入股票代码">
            </div>
        </div>
        <div class="row g-2 mb-3">
            <div class="col-md-6">
                <label class="form-label">年份选择</label>
                <div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="recentYearsCheck">
                        <label class="form-check-label" for="recentYearsCheck">近年</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="checkbox" id="fullYearsCheck">
                        <label class="form-check-label" for="fullYearsCheck">整年</label>
                    </div>
                </div>
            </div>
            <div class="col-md-6 d-flex align-items-end">
                <div id="sheetInfo" style="display:none;" class="alert alert-info w-100 mb-0">
                    <div class="mb-2">
                        <strong>标题：</strong> <span id="sheetTitle"></span>
                        <span class="ms-3"><strong>Sheet 名称：</strong> <span id="sheetName"></span></span>
                    </div>
                    <div class="row" id="yearsDisplay" style="display:none;">
                        <div class="col-md-6">
                            <strong>近年：</strong> <span id="recentYearsDisplay"></span>
                        </div>
                        <div class="col-md-6">
                            <strong>整年：</strong> <span id="fullYearsDisplay"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="recentYearsOptions" style="display:none;" class="mb-3">
            <label class="form-label">近年选择</label>
            <div id="recentYearsCheckboxes"></div>
        </div>
        <div id="fullYearsOptions" style="display:none;" class="mb-3">
            <label class="form-label">整年选择</label>
            <div id="fullYearsCheckboxes"></div>
        </div>
    </div>
</div>

<div class="card" id="paramSection" style="display:none;">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h5 class="mb-0">参数管理</h5>
        <button type="button" class="btn btn-success btn-sm" id="addParamBtn">
            <i class="bi bi-plus"></i> 添加参数行
        </button>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-bordered table-hover" id="paramTable">
                <thead class="table-light" id="paramTableHead"></thead>
                <tbody id="paramTableBody"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let columnCount = 6;
let modelTitle = '';

const currentYear = new Date().getFullYear();
const recentYearsContainer = document.getElementById('recentYearsCheckboxes');
const fullYearsContainer = document.getElementById('fullYearsCheckboxes');

function extractSpreadsheetId(url) {
    const match = (url || '').match(/\/d\/([a-zA-Z0-9-_]+)/);
    return match ? match[1] : '';
}

function updateTableHeader() {
    const head = document.getElementById('paramTableHead');
    let html = '<tr>';
    for (let i = 1; i <= columnCount; i++) {
        html += `<th>参数${i}</th>`;
    }
    html += '<th>操作</th></tr>';
    head.innerHTML = html;
}

function collectParameterRows() {
    return Array.from(document.querySelectorAll('#paramTableBody tr'))
        .map(row => Array.from(row.querySelectorAll('.param-input')).map(input => (input.value || '').trim()))
        .filter(row => row.some(Boolean));
}

function updateYearsDisplay() {
    const recentChecked = Array.from(document.querySelectorAll('.recent-year:checked')).map(cb => `近${cb.value}年`);
    const fullChecked = Array.from(document.querySelectorAll('.full-year:checked')).map(cb => cb.value);

    document.getElementById('recentYearsDisplay').textContent = recentChecked.join(', ') || '无';
    document.getElementById('fullYearsDisplay').textContent = fullChecked.join(', ') || '无';
    document.getElementById('yearsDisplay').style.display = (recentChecked.length || fullChecked.length) ? 'flex' : 'none';
}

function addParamRow() {
    const tbody = document.getElementById('paramTableBody');
    let row = '<tr>';
    for (let i = 0; i < columnCount; i++) {
        row += '<td><input type="text" class="form-control form-control-sm param-input"></td>';
    }
    row += '<td><button class="btn btn-danger btn-sm delete-row">删除</button></td></tr>';
    tbody.insertAdjacentHTML('beforeend', row);
}

for (let i = 1; i <= 7; i++) {
    recentYearsContainer.innerHTML += `
        <div class="form-check form-check-inline">
            <input class="form-check-input recent-year" type="checkbox" id="recent${i}" value="${i}">
            <label class="form-check-label" for="recent${i}">近${i}年</label>
        </div>`;
}

for (let i = 0; i < 7; i++) {
    const year = currentYear - i;
    fullYearsContainer.innerHTML += `
        <div class="form-check form-check-inline">
            <input class="form-check-input full-year" type="checkbox" id="full${year}" value="${year}">
            <label class="form-check-label" for="full${year}">${year}</label>
        </div>`;
}

document.getElementById('recentYearsCheck').addEventListener('change', (e) => {
    const checked = e.target.checked;
    document.getElementById('recentYearsOptions').style.display = checked ? 'block' : 'none';
    document.querySelectorAll('.recent-year').forEach((cb, index) => {
        cb.checked = checked && index < 3;
    });
    updateYearsDisplay();
});

document.getElementById('fullYearsCheck').addEventListener('change', (e) => {
    const checked = e.target.checked;
    document.getElementById('fullYearsOptions').style.display = checked ? 'block' : 'none';
    document.querySelectorAll('.full-year').forEach((cb, index) => {
        cb.checked = checked && index < 3;
    });
    updateYearsDisplay();
});

document.addEventListener('change', (e) => {
    if (e.target.classList.contains('recent-year') || e.target.classList.contains('full-year')) {
        updateYearsDisplay();
    }
});

document.getElementById('analyzeBtn').addEventListener('click', async () => {
    const spreadsheetId = extractSpreadsheetId(document.getElementById('modelUrl').value);
    if (!spreadsheetId) {
        alert('请输入有效的 Google Sheet URL');
        return;
    }

    const res = await fetch('/api/google-sheet/worksheets', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ spreadsheet_id: spreadsheetId })
    });
    const data = await res.json();

    if (data.status !== 'success') {
        alert('分析失败: ' + (data.message || '未知错误'));
        return;
    }

    modelTitle = data.title || '';
    document.getElementById('sheetTitle').textContent = modelTitle;
    document.getElementById('sheetName').textContent = (data.worksheets && data.worksheets[0]) || '';
    document.getElementById('sheetInfo').style.display = 'block';

    const taskNameInput = document.getElementById('taskName');
    if (!taskNameInput.value.trim() && modelTitle) {
        taskNameInput.value = modelTitle;
    }

    const upperTitle = modelTitle.toUpperCase();
    columnCount = (upperTitle.includes('C5') || upperTitle.includes('C4')) ? 2 : 6;
    updateTableHeader();
    document.getElementById('paramSection').style.display = 'block';

    if (!document.querySelector('#paramTableBody tr')) {
        addParamRow();
    }
});

document.getElementById('addParamBtn').addEventListener('click', addParamRow);

document.getElementById('paramTableBody').addEventListener('click', (e) => {
    if (e.target.classList.contains('delete-row')) {
        e.target.closest('tr').remove();
    }
});

document.getElementById('createBtn').addEventListener('click', async () => {
    const modelUrl = document.getElementById('modelUrl').value.trim();
    const taskName = document.getElementById('taskName').value.trim();
    const stockCode = document.getElementById('stockCode').value.trim();
    const spreadsheetId = extractSpreadsheetId(modelUrl);
    const sheetName = document.getElementById('sheetName').textContent.trim() || 'data';

    if (!spreadsheetId) {
        alert('请输入有效的 Google Sheet URL');
        return;
    }
    if (!taskName) {
        alert('请输入任务名称');
        return;
    }
    if (!stockCode) {
        alert('请输入股票代码');
        return;
    }

    const parameterRows = collectParameterRows();
    if (!parameterRows.length) {
        alert('请至少填写一行参数');
        return;
    }

    const recentYears = Array.from(document.querySelectorAll('.recent-year:checked')).map(cb => parseInt(cb.value, 10));
    const fullYears = Array.from(document.querySelectorAll('.full-year:checked')).map(cb => parseInt(cb.value, 10));

    const payload = {
        name: taskName,
        description: `backtest training task for ${sheetName}`,
        task_type: 'backtest_training',
        config: {
            sheet: {
                spreadsheet_id: spreadsheetId,
                sheet_name: sheetName,
                title: modelTitle || taskName
            },
            stock_code: stockCode,
            parameters: parameterRows,
            recent_years: recentYears,
            full_years: fullYears
        }
    };

    const res = await fetch('/api/tasks', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
    });
    const data = await res.json();

    if (data.status === 'success' && data.task_id) {
        alert('任务创建成功');
        window.location.href = '/backtest-training/list';
        return;
    }

    alert('创建任务失败: ' + (data.message || '未知错误'));
});

updateTableHeader();
</script>
{% endblock %}
