{% extends "google_sheet/base.html" %}

{% block title %}C3 合并导出{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12">
        <!-- 头部 -->
        <div class="card border-0 shadow-lg mb-4 overflow-hidden">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <h3 class="text-primary fw-bold mb-1"><i class="bi bi-files me-2"></i>C3 合并导出</h3>
                        <p class="text-muted mb-0 small">搜索并选择多个 C3 任务，合并导出 Excel 文件</p>
                    </div>
                    <a href="{{ url_for('google_sheet.index', version='c3') }}"
                       class="btn btn-outline-secondary btn-lg px-4 shadow-sm">
                        <i class="bi bi-arrow-left me-2"></i>返回列表
                    </a>
                </div>
            </div>
        </div>

        <!-- 搜索区域 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">搜索任务</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-search"></i></span>
                            <input type="text" class="form-control" id="search-keyword"
                                   placeholder="输入任务名称关键词搜索…">
                            <button class="btn btn-outline-primary" onclick="doSearch()">搜索</button>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">任务状态</label>
                        <select class="form-select" id="search-status">
                            <option value="">全部状态</option>
                            <option value="completed">已完成</option>
                            <option value="running">执行中</option>
                            <option value="error">执行出错</option>
                            <option value="cancelled">已取消</option>
                        </select>
                    </div>
                    <div class="col-md-3 d-flex gap-2">
                        <button class="btn btn-outline-secondary flex-fill" onclick="resetSearch()">
                            <i class="bi bi-arrow-clockwise"></i> 重置
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 操作栏 -->
        <div class="card mb-4 shadow-sm">
            <div class="card-body py-3">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div class="d-flex align-items-center gap-3">
                        <span class="fw-bold">已选 <span class="badge bg-primary" id="selected-count">0</span> 个任务</span>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-primary" onclick="selectAll()">
                                <i class="bi bi-check-all"></i> 全选当页
                            </button>
                            <button class="btn btn-outline-secondary" onclick="deselectAll()">
                                <i class="bi bi-x-lg"></i> 清空选择
                            </button>
                            <button class="btn btn-outline-info" onclick="invertSelection()">
                                <i class="bi bi-arrow-left-right"></i> 反选
                            </button>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-2">
                        <button class="btn btn-success" id="export-btn" onclick="doExport()" disabled>
                            <i class="bi bi-file-earmark-excel me-1"></i> 导出选中任务
                        </button>
                        <small class="text-muted">最多 10 个任务</small>
                    </div>
                </div>
                <!-- 下载进度条 -->
                <div id="download-progress" class="mt-3" style="display:none">
                    <div class="d-flex justify-content-between align-items-center mb-1">
                        <small class="text-muted" id="progress-status">正在生成文件…</small>
                        <small class="text-muted" id="progress-pct">0%</small>
                    </div>
                    <div class="progress" style="height:6px">
                        <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated"
                             role="progressbar" style="width:0%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索结果表格 -->
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-sm mb-0" id="tasks-table">
                        <thead>
                        <tr class="table-light">
                            <th style="width:40px" class="text-center ps-3">
                                <input class="form-check-input" type="checkbox" id="header-check"
                                       onchange="onHeaderCheckChange(this)">
                            </th>
                            <th style="width:60px" class="sortable" data-sort="id" onclick="toggleSort('id')">
                                ID <span class="sort-icon" id="sort-icon-id"></span>
                            </th>
                            <th class="sortable" data-sort="name" onclick="toggleSort('name')">
                                任务名称 <span class="sort-icon" id="sort-icon-name"></span>
                            </th>
                            <th style="width:160px" class="sortable" data-sort="created_at" onclick="toggleSort('created_at')">
                                创建时间 <span class="sort-icon" id="sort-icon-created_at"></span>
                            </th>
                            <th style="width:100px" class="sortable" data-sort="status" onclick="toggleSort('status')">
                                状态 <span class="sort-icon" id="sort-icon-status"></span>
                            </th>
                            <th style="width:100px">进度</th>
                            <th style="width:160px">开始时间</th>
                            <th style="width:160px">结束时间</th>
                        </tr>
                        </thead>
                        <tbody id="tasks-table-body">
                        <tr><td colspan="8" class="text-center text-muted py-4">输入关键词搜索任务</td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- 分页 -->
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 px-3 py-3 border-top">
                    <span class="text-muted small" id="pagination-info">显示第 0-0 条，共 0 条</span>
                    <div class="d-flex align-items-center gap-3">
                        <nav aria-label="搜索分页">
                            <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                        </nav>
                        <div class="d-flex align-items-center">
                            <label class="form-label me-2 mb-0 text-muted small">每页:</label>
                            <select class="form-select form-select-sm" id="page-size-select"
                                    style="width:75px" onchange="changePageSize()">
                                <option value="10">10</option>
                                <option value="20" selected>20</option>
                                <option value="50">50</option>
                                <option value="100">100</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // ── 全局状态 ──
    const taskType = 'google_sheet';
    let allTasks = [];
    let currentPage = 1;
    let tasksPerPage = 20;
    let totalTasks = 0;
    let totalPages = 0;
    let selectedTaskIds = new Set();
    let sortField = 'created_at';
    let sortDir = 'desc';
    let isLoading = false;

    document.addEventListener('DOMContentLoaded', function() {
        const input = document.getElementById('search-keyword');
        if (input) {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') { e.preventDefault(); doSearch(); }
            });
        }
        doSearch();
    });

    // ── 搜索 ──
    function doSearch(page) {
        if (isLoading) return;
        isLoading = true;
        if (page) currentPage = page;

        const keyword = (document.getElementById('search-keyword').value || '').trim();
        const status = document.getElementById('search-status').value;

        const params = new URLSearchParams({
            task_type: taskType,
            page: currentPage,
            per_page: tasksPerPage,
        });
        if (keyword) params.set('keyword', keyword);
        if (status) params.set('status', status);

        ajaxRequest(`/api/tasks?${params}`, 'GET', null, function(err, data) {
            isLoading = false;
            if (err || !data || !data.tasks) {
                showNotification('搜索失败', 'error');
                return;
            }
            allTasks = data.tasks;
            const pg = data.pagination || {};
            totalTasks = pg.total || 0;
            totalPages = pg.pages || 0;
            currentPage = pg.page || currentPage;
            renderTable();
            renderPagination();
        });
    }

    function resetSearch() {
        document.getElementById('search-keyword').value = '';
        document.getElementById('search-status').value = '';
        currentPage = 1;
        doSearch();
    }

    // ── 表格渲染 ──
    function renderTable() {
        const tbody = document.getElementById('tasks-table-body');
        tbody.innerHTML = '';

        if (!allTasks.length) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted py-4">未找到匹配任务</td></tr>';
            return;
        }

        allTasks.forEach(function(task) {
            const checked = selectedTaskIds.has(String(task.id));
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="text-center ps-3">
                    <input class="form-check-input" type="checkbox" value="${task.id}"
                           ${checked ? 'checked' : ''} onchange="onRowCheckChange(this)">
                </td>
                <td><small class="text-muted">${escapeHtml(String(task.id).substring(0, 8))}</small></td>
                <td>
                    <div class="fw-bold">${escapeHtml(task.name)}</div>
                    ${task.description ? `<small class="text-muted">${escapeHtml(task.description)}</small>` : ''}
                </td>
                <td><small>${formatTime(task.created_at)}</small></td>
                <td><span class="badge ${getStatusClass(task.status)}">${getStatusText(task.status)}</span></td>
                <td>${task.current_step}/${task.total_steps}</td>
                <td><small>${formatTime(task.start_time)}</small></td>
                <td><small>${formatTime(task.end_time)}</small></td>
            `;
            tbody.appendChild(row);
        });

        updateSelectedCount();
        updateSortIcons();
    }

    // ── 分页 ──
    function renderPagination() {
        const el = document.getElementById('pagination');
        const info = document.getElementById('pagination-info');
        el.innerHTML = '';

        const start = totalTasks > 0 ? (currentPage - 1) * tasksPerPage + 1 : 0;
        const end = Math.min(currentPage * tasksPerPage, totalTasks);
        info.textContent = `显示第 ${start}-${end} 条，共 ${totalTasks} 条`;

        if (totalPages <= 1) return;

        function addLi(text, page, disabled, active) {
            const li = document.createElement('li');
            li.className = `page-item ${disabled ? 'disabled' : ''} ${active ? 'active' : ''}`;
            li.innerHTML = `<a class="page-link" href="#" onclick="event.preventDefault();doSearch(${page})">${text}</a>`;
            el.appendChild(li);
        }

        addLi('«', 1, currentPage === 1);
        addLi('‹', Math.max(1, currentPage - 1), currentPage === 1);

        let s = Math.max(1, currentPage - 2);
        let e = Math.min(totalPages, currentPage + 2);
        if (s > 1) { addLi('1', 1); if (s > 2) addLi('…', 0, true); }
        for (let i = s; i <= e; i++) addLi(i, i, false, i === currentPage);
        if (e < totalPages) { if (e < totalPages - 1) addLi('…', 0, true); addLi(totalPages, totalPages); }

        addLi('›', Math.min(totalPages, currentPage + 1), currentPage === totalPages);
        addLi('»', totalPages, currentPage === totalPages);
    }

    function changePageSize() {
        tasksPerPage = parseInt(document.getElementById('page-size-select').value) || 20;
        currentPage = 1;
        doSearch();
    }

    // ── 多选 ──
    function onRowCheckChange(cb) {
        const id = String(cb.value);
        cb.checked ? selectedTaskIds.add(id) : selectedTaskIds.delete(id);
        updateSelectedCount();
    }

    function onHeaderCheckChange(cb) {
        const checked = cb.checked;
        document.querySelectorAll('#tasks-table-body input[type=checkbox]').forEach(c => {
            c.checked = checked;
            const id = String(c.value);
            checked ? selectedTaskIds.add(id) : selectedTaskIds.delete(id);
        });
        updateSelectedCount();
    }

    function selectAll() {
        allTasks.forEach(t => selectedTaskIds.add(String(t.id)));
        document.querySelectorAll('#tasks-table-body input[type=checkbox]').forEach(c => c.checked = true);
        updateSelectedCount();
    }

    function deselectAll() {
        selectedTaskIds.clear();
        document.querySelectorAll('#tasks-table-body input[type=checkbox],#header-check').forEach(c => c.checked = false);
        updateSelectedCount();
    }

    function invertSelection() {
        document.querySelectorAll('#tasks-table-body input[type=checkbox]').forEach(c => {
            c.checked = !c.checked;
            const id = String(c.value);
            c.checked ? selectedTaskIds.add(id) : selectedTaskIds.delete(id);
        });
        updateSelectedCount();
    }

    function updateSelectedCount() {
        const count = selectedTaskIds.size;
        const badge = document.getElementById('selected-count');
        badge.textContent = count;
        // 超过最大限制时变色提示并禁用导出按钮
        const overLimit = count > MAX_EXPORT_TASKS;
        badge.className = 'badge ' + (overLimit ? 'bg-danger' : 'bg-primary');
        const btn = document.getElementById('export-btn');
        btn.disabled = count === 0 || overLimit;
        btn.title = overLimit ? `最多支持 ${MAX_EXPORT_TASKS} 个任务` : '';
        const headerCheck = document.getElementById('header-check');
        if (headerCheck) {
            const bodyChecks = document.querySelectorAll('#tasks-table-body input[type=checkbox]');
            headerCheck.checked = bodyChecks.length > 0 && Array.from(bodyChecks).every(c => c.checked);
            headerCheck.indeterminate = !headerCheck.checked && Array.from(bodyChecks).some(c => c.checked);
        }
    }

    // ── 列排序 ──
    function toggleSort(field) {
        if (sortField === field) {
            sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
            sortField = field;
            sortDir = 'desc';
        }
        allTasks.sort(function(a, b) {
            let va = a[field] || '', vb = b[field] || '';
            if (field === 'created_at' || field === 'start_time' || field === 'end_time') {
                va = va ? new Date(va).getTime() : 0;
                vb = vb ? new Date(vb).getTime() : 0;
            } else {
                va = String(va).toLowerCase();
                vb = String(vb).toLowerCase();
            }
            if (va < vb) return sortDir === 'asc' ? -1 : 1;
            if (va > vb) return sortDir === 'asc' ? 1 : -1;
            return 0;
        });
        renderTable();
    }

    function updateSortIcons() {
        document.querySelectorAll('.sort-icon').forEach(el => el.textContent = '');
        const icon = document.getElementById('sort-icon-' + sortField);
        if (icon) icon.textContent = sortDir === 'asc' ? ' ↑' : ' ↓';
    }

    const MAX_EXPORT_TASKS = 10;

    // ── 流式下载工具 ──────────────────────────────────────────
    // 使用 ReadableStream 实时接收数据块并显示进度
    function streamingDownload(url, options, onProgress) {
        return fetch(url, options).then(async resp => {
            if (!resp.ok) {
                const errData = await resp.json().catch(() => ({}));
                throw new Error(errData.message || `请求失败 (${resp.status})`);
            }

            const contentLength = parseInt(resp.headers.get('Content-Length') || '0', 10);
            const disposition = resp.headers.get('Content-Disposition') || '';
            const filenameMatch = disposition.match(/filename\*?=(?:UTF-8''|"?)([^";]+)/i);
            const filename = filenameMatch
                ? decodeURIComponent(filenameMatch[1].replace(/"/g, ''))
                : 'export.xlsx';

            // 无 body 时直接读 blob
            if (!resp.body) {
                const blob = await resp.blob();
                onProgress && onProgress({ received: blob.size, total: blob.size, percent: 100 });
                return { blob, filename };
            }

            const reader = resp.body.getReader();
            const chunks = [];
            let received = 0;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                chunks.push(value);
                received += value.length;
                onProgress && onProgress({
                    received,
                    total: contentLength || 0,
                    percent: contentLength ? Math.round((received / contentLength) * 100) : -1,
                });
            }

            const blob = new Blob(chunks, {
                type: resp.headers.get('Content-Type') || 'application/octet-stream',
            });
            return { blob, filename };
        });
    }

    // 触发浏览器下载
    function triggerDownload(blob, filename) {
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        window.URL.revokeObjectURL(url);
        a.remove();
    }

    // 进度条 UI 控制
    function showProgress(statusText, percent) {
        const wrap = document.getElementById('download-progress');
        const bar = document.getElementById('progress-bar');
        const pct = document.getElementById('progress-pct');
        const status = document.getElementById('progress-status');
        wrap.style.display = 'block';
        status.textContent = statusText;
        if (percent < 0) {
            // 未知长度：持续动画
            bar.classList.add('progress-bar-animated');
            bar.style.width = '100%';
            pct.textContent = formatBytes(receivedBytes);
        } else {
            bar.classList.remove('progress-bar-animated');
            bar.style.width = percent + '%';
            pct.textContent = percent + '%';
        }
    }
    function hideProgress() {
        document.getElementById('download-progress').style.display = 'none';
        document.getElementById('progress-bar').style.width = '0%';
    }
    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / 1048576).toFixed(1) + ' MB';
    }
    let receivedBytes = 0;

    // ── 导出 ──
    function doExport() {
        if (selectedTaskIds.size === 0) return;
        if (selectedTaskIds.size > MAX_EXPORT_TASKS) {
            showNotification(`合并导出最多支持 ${MAX_EXPORT_TASKS} 个任务，当前已选 ${selectedTaskIds.size} 个`, 'warning');
            return;
        }
        const btn = document.getElementById('export-btn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> 生成中…';
        btn.disabled = true;
        receivedBytes = 0;
        showProgress('正在生成文件，请稍候…', 0);

        streamingDownload(
            '/api/tasks/batch-export',
            {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ task_ids: Array.from(selectedTaskIds) }),
            },
            function onProgress(info) {
                receivedBytes = info.received;
                if (info.percent < 0) {
                    showProgress('下载中… ' + formatBytes(info.received), -1);
                } else {
                    showProgress(
                        '下载中… ' + formatBytes(info.received) + ' / ' + formatBytes(info.total),
                        info.percent
                    );
                }
            }
        )
        .then(({ blob, filename }) => {
            triggerDownload(blob, filename);
            showProgress('下载完成', 100);
            setTimeout(hideProgress, 2000);
            showNotification(`合并导出成功（${selectedTaskIds.size} 个任务）`, 'success');
        })
        .catch(err => {
            hideProgress();
            showNotification('合并导出失败: ' + err.message, 'error');
        })
        .finally(() => {
            btn.innerHTML = originalText;
            btn.disabled = selectedTaskIds.size === 0 || selectedTaskIds.size > MAX_EXPORT_TASKS;
        });
    }

    function escapeHtml(value) {
        return String(value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
<style>
    .sortable { cursor: pointer; user-select: none; }
    .sortable:hover { background-color: #e9ecef; }
    .sort-icon { font-size: 0.75rem; color: #0d6efd; }
</style>
{% endblock %}
