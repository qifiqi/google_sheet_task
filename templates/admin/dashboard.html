{% extends "admin/base.html" %}

{% block title %}仪表盘 - 任务管理系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">仪表盘</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="loadDashboard(true)">
            <i class="bi bi-arrow-clockwise"></i> 刷新
        </button>
    </div>
</div>

<div class="row g-3 mb-4" id="summary-cards">
    <div class="col-xl-2 col-md-4 col-6"><div class="card stat-card h-100"><div class="card-body"><div class="small">总任务数</div><div class="h4 mb-0" id="summary-total">0</div></div></div></div>
    <div class="col-xl-2 col-md-4 col-6"><div class="card stat-card success h-100"><div class="card-body"><div class="small">已完成</div><div class="h4 mb-0" id="summary-completed">0</div></div></div></div>
    <div class="col-xl-2 col-md-4 col-6"><div class="card stat-card warning h-100"><div class="card-body"><div class="small">运行中</div><div class="h4 mb-0" id="summary-running">0</div></div></div></div>
    <div class="col-xl-2 col-md-4 col-6"><div class="card stat-card danger h-100"><div class="card-body"><div class="small">错误</div><div class="h4 mb-0" id="summary-error">0</div></div></div></div>
    <div class="col-xl-2 col-md-4 col-6"><div class="card h-100"><div class="card-body"><div class="small text-muted">已取消</div><div class="h4 mb-0" id="summary-cancelled">0</div></div></div></div>
    <div class="col-xl-2 col-md-4 col-6"><div class="card h-100"><div class="card-body"><div class="small text-muted">待执行</div><div class="h4 mb-0" id="summary-pending">0</div></div></div></div>
</div>

<div class="row g-3 mb-4">
    <div class="col-lg-8">
        <div class="card h-100">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span><i class="bi bi-graph-up-arrow"></i> 最近 7 天任务趋势</span>
                <small class="text-muted" id="dashboard-last-update">-</small>
            </div>
            <div class="card-body">
                <canvas id="taskTrendChart" height="120"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-4">
        <div class="card h-100">
            <div class="card-header"><i class="bi bi-pie-chart"></i> 状态分布</div>
            <div class="card-body">
                <canvas id="taskStatusChart" height="220"></canvas>
            </div>
        </div>
    </div>
</div>

<div class="row g-3 mb-4">
    <div class="col-lg-5">
        <div class="card h-100">
            <div class="card-header"><i class="bi bi-bar-chart"></i> 任务类型分布</div>
            <div class="card-body">
                <canvas id="taskTypeChart" height="200"></canvas>
            </div>
        </div>
    </div>
    <div class="col-lg-7">
        <div class="card h-100">
            <div class="card-header"><i class="bi bi-cpu"></i> 正在运行任务</div>
            <div class="card-body">
                <div id="active-task-list" class="row g-3"></div>
            </div>
        </div>
    </div>
</div>

<div class="card">
    <div class="card-header"><i class="bi bi-clock-history"></i> 最近任务详情</div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th>任务</th>
                        <th>状态</th>
                        <th>停止确认</th>
                        <th>参数组</th>
                        <th>进度</th>
                        <th>耗时</th>
                        <th>时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="recent-task-table"></tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script>
    let dashboardCharts = {};
    let dashboardRefreshTimer = null;

    function upsertChart(key, canvasId, config) {
        if (dashboardCharts[key]) {
            dashboardCharts[key].destroy();
        }
        const ctx = document.getElementById(canvasId).getContext('2d');
        dashboardCharts[key] = new Chart(ctx, config);
    }

    function renderSummary(summary) {
        document.getElementById('summary-total').textContent = summary.total_tasks || 0;
        document.getElementById('summary-completed').textContent = summary.completed_tasks || 0;
        document.getElementById('summary-running').textContent = summary.running_tasks || 0;
        document.getElementById('summary-error').textContent = summary.error_tasks || 0;
        document.getElementById('summary-cancelled').textContent = summary.cancelled_tasks || 0;
        document.getElementById('summary-pending').textContent = summary.pending_tasks || 0;
    }

    function renderTrendChart(items) {
        upsertChart('trend', 'taskTrendChart', {
            type: 'line',
            data: {
                labels: items.map(item => item.date),
                datasets: [
                    {
                        label: '创建任务',
                        data: items.map(item => item.created),
                        borderColor: '#0d6efd',
                        backgroundColor: 'rgba(13, 110, 253, 0.15)',
                        fill: true,
                        tension: 0.3
                    },
                    {
                        label: '完成任务',
                        data: items.map(item => item.completed),
                        borderColor: '#198754',
                        backgroundColor: 'rgba(25, 135, 84, 0.12)',
                        fill: true,
                        tension: 0.3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'top' } }
            }
        });
    }

    function renderDoughnutChart() {
        const statusData = window.dashboardData.status_distribution || {};
        upsertChart('status', 'taskStatusChart', {
            type: 'doughnut',
            data: {
                labels: Object.keys(statusData),
                datasets: [{
                    data: Object.values(statusData),
                    backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545', '#6c757d', '#20c997']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    function renderTypeChart() {
        const typeData = window.dashboardData.task_type_distribution || {};
        upsertChart('type', 'taskTypeChart', {
            type: 'bar',
            data: {
                labels: Object.keys(typeData),
                datasets: [{
                    label: '任务数',
                    data: Object.values(typeData),
                    backgroundColor: '#6f42c1'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                indexAxis: 'y',
                plugins: { legend: { display: false } }
            }
        });
    }

    function renderActiveTasks(tasks) {
        const container = document.getElementById('active-task-list');
        if (!tasks.length) {
            container.innerHTML = '<div class="col-12 text-muted">当前没有运行中的任务。</div>';
            return;
        }

        container.innerHTML = tasks.map(task => `
            <div class="col-md-6">
                <div class="border rounded p-3 h-100">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <div class="fw-semibold">${task.name}</div>
                            <div class="small text-muted">${task.task_type}</div>
                        </div>
                        <span class="${getStatusClass(task.status)}">${getStatusText(task.status)}</span>
                    </div>
                    <div class="small text-muted mb-2">参数组: ${task.config_summary.parameter_groups || 0}</div>
                    <div class="progress mb-2" style="height: 18px;">
                        <div class="progress-bar" style="width:${task.progress_percentage || 0}%">${task.current_step || 0}/${task.total_steps || 0}</div>
                    </div>
                    <div class="small mb-1">停止请求: ${task.stop_confirmation.stop_requested ? '<span class="text-warning">已发出</span>' : '<span class="text-muted">未发出</span>'}</div>
                    <div class="small mb-2">完全停止: ${task.stop_confirmation.stop_confirmed ? '<span class="text-success">是</span>' : '<span class="text-muted">否</span>'}</div>
                    <a class="btn btn-sm btn-outline-primary" href="/google-sheet/detail?task_id=${task.id}">查看详情</a>
                </div>
            </div>
        `).join('');
    }

    function renderRecentTasks(tasks) {
        const tbody = document.getElementById('recent-task-table');
        tbody.innerHTML = tasks.map(task => `
            <tr>
                <td>
                    <div class="fw-semibold">${task.name}</div>
                    <div class="small text-muted">${task.task_type}</div>
                </td>
                <td><span class="${getStatusClass(task.status)}">${getStatusText(task.status)}</span></td>
                <td>
                    ${task.stop_confirmation.stop_confirmed
                        ? '<span class="badge bg-success">已完全停止</span>'
                        : (task.stop_confirmation.stop_requested
                            ? '<span class="badge bg-warning text-dark">停止中</span>'
                            : '<span class="badge bg-secondary">未停止</span>')}
                </td>
                <td>${task.config_summary.parameter_groups || 0}</td>
                <td style="min-width:160px;">
                    <div class="progress" style="height: 18px;">
                        <div class="progress-bar" style="width:${task.progress_percentage || 0}%">${task.current_step || 0}/${task.total_steps || 0}</div>
                    </div>
                </td>
                <td>${task.duration_seconds != null ? task.duration_seconds + 's' : '-'}</td>
                <td>${formatTime(task.created_at)}</td>
                <td><button class="btn btn-sm btn-outline-info" onclick="window.location.href='/admin/tasks';">查看</button></td>
            </tr>
        `).join('');
    }

    function loadDashboard(showToast = false) {
        ajaxRequest('/admin/api/dashboard/overview', 'GET', null, function(err, data) {
            if (err || !data || !data.success) {
                showNotification('加载仪表盘失败', 'error');
                return;
            }

            window.dashboardData = data;
            renderSummary(data.summary || {});
            renderTrendChart(data.daily_trend || []);
            renderDoughnutChart();
            renderTypeChart();
            renderActiveTasks(data.active_tasks || []);
            renderRecentTasks(data.recent_tasks || []);
            document.getElementById('dashboard-last-update').textContent = formatTime(data.checked_at);

            if (showToast) {
                showNotification('仪表盘已刷新', 'success');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        loadDashboard(false);
        ajaxRequest('/api/config', 'GET', null, function(err, data) {
            const interval = (data && data.config && data.config.dashboard_refresh_interval)
                ? data.config.dashboard_refresh_interval
                : 30000;
            dashboardRefreshTimer = setInterval(loadDashboard, interval);
        });
    });
</script>
{% endblock %}
