<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}任务管理系统{% endblock %}</title>

    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='font/bootstrap-icons.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

<!--?    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">-->
<!--?    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">-->
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@5.15.4/css/all.min.css" rel="stylesheet">
<!--?    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>-->
    <style>
        body {
            background-color: #f8f9fa;
        }
        .sidebar {
            min-height: 100vh;
            background-color: #343a40;
            overflow-y: auto;
        }
        .sidebar .nav-link {
            color: #adb5bd;
            padding: 0.75rem 1rem;
            border-radius: 0.375rem;
            margin-bottom: 0.25rem;
        }
        .sidebar .nav-link:hover {
            color: #fff;
            background-color: #495057;
        }
        .sidebar .nav-link.active {
            color: #fff;
            background-color: #007bff;
        }
        .sidebar .nav-group-title {
            color: #6c757d;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.5rem 1rem;
            margin-top: 1rem;
            margin-bottom: 0.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .sidebar .nav-group-title:hover {
            color: #adb5bd;
        }
        .sidebar .nav-group-title i {
            transition: transform 0.2s ease;
        }
        .sidebar .nav-group-title.collapsed i {
            transform: rotate(-90deg);
        }
        .sidebar .nav-group {
            margin-bottom: 0.5rem;
        }
        .sidebar .nav-group .nav-link {
            padding-left: 2.5rem;
            font-size: 0.9rem;
        }
        .main-content {
            padding: 20px;
        }

        /* 固定侧边栏：让主内容区滚动时侧边栏不跟随滚动（仅 md 及以上生效） */
        @media (min-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                z-index: 1000;
            }

            /* md: sidebar = col-md-3 (25%) */
            .main-content {
                margin-left: 25%;
            }
        }

        @media (min-width: 992px) {
            /* lg: sidebar = col-lg-2 (16.6667%) */
            .main-content {
                margin-left: 16.666667%;
            }
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            border: 1px solid rgba(0, 0, 0, 0.125);
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .stat-card.success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        .stat-card.warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .stat-card.danger {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .table-responsive {
            border-radius: 0.375rem;
        }
        .badge {
            font-size: 0.75em;
        }
        .log-container {
            height: 400px;
            overflow-y: auto;
            overflow-x: auto;
            background-color: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            font-family: 'Courier New', monospace;
            border-radius: 0.375rem;
            font-size: 14px;
            white-space: pre;
            word-break: normal;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- 侧边栏 -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky pt-3">
                    <div class="text-center mb-4">
                        <h4 class="text-white">任务管理系统</h4>
                    </div>
                    <div class="nav flex-column">
                        <!-- 仪表盘 -->
                        <div class="nav-item">
                            <a class="nav-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}" href="{{ url_for('admin.dashboard') }}">
                                <i class="bi bi-speedometer2"></i> 仪表盘
                            </a>
                        </div>

                        <!-- 任务模块 -->
                        <div class="nav-group">
                            <div class="nav-group-title" data-bs-toggle="collapse" data-bs-target="#taskGroup" aria-expanded="false">
                                <span><i class="bi bi-list-task me-2"></i>任务模块</span>
                                <i class="bi bi-chevron-down"></i>
                            </div>
                            <div class="collapse" id="taskGroup">
                                <div class="nav-item">
                                    <a class="nav-link {% if request.endpoint == 'admin.tasks' %}active{% endif %}" href="{{ url_for('admin.tasks') }}">
                                        <i class="bi bi-play-circle"></i> 任务管理
                                    </a>
                                </div>
                                <div class="nav-item">
                                    <a class="nav-link {% if request.endpoint == 'admin.templates' %}active{% endif %}" href="{{ url_for('admin.templates') }}">
                                        <i class="bi bi-file-earmark-text"></i> 任务模板
                                    </a>
                                </div>
                                <div class="nav-item">
                                    <a class="nav-link {% if request.endpoint == 'admin.results' %}active{% endif %}" href="{{ url_for('admin.results') }}">
                                        <i class="bi bi-clipboard-data"></i> 任务结果
                                    </a>
                                </div>
                            </div>
                        </div>

                        <!-- 调度模块 -->
                        <div class="nav-group">
                            <div class="nav-group-title" data-bs-toggle="collapse" data-bs-target="#schedulerGroup" aria-expanded="false">
                                <span><i class="bi bi-clock me-2"></i>调度模块</span>
                                <i class="bi bi-chevron-down"></i>
                            </div>
                            <div class="collapse" id="schedulerGroup">
                                <div class="nav-item">
                                    <a class="nav-link {% if request.endpoint == 'admin.scheduler' %}active{% endif %}" href="{{ url_for('admin.scheduler') }}">
                                        <i class="bi bi-calendar-event"></i> 定时任务
                                    </a>
                                </div>
                            </div>
                        </div>

                        <!-- 系统模块 -->
                        <div class="nav-group">
                            <div class="nav-group-title" data-bs-toggle="collapse" data-bs-target="#systemGroup" aria-expanded="false">
                                <span><i class="bi bi-gear me-2"></i>系统模块</span>
                                <i class="bi bi-chevron-down"></i>
                            </div>
                            <div class="collapse" id="systemGroup">
                                <div class="nav-item">
                                    <a class="nav-link {% if request.endpoint == 'admin.config' %}active{% endif %}" href="{{ url_for('admin.config') }}">
                                        <i class="bi bi-sliders"></i> 系统配置
                                    </a>
                                </div>
                                <div class="nav-item">
                                    <a class="nav-link {% if request.endpoint == 'admin.logs' %}active{% endif %}" href="{{ url_for('admin.logs') }}">
                                        <i class="bi bi-journal-text"></i> 系统日志
                                    </a>
                                </div>
                            </div>
                        </div>

                        <!-- 业务模块 -->
                        <div class="nav-group">
                            <div class="nav-group-title" data-bs-toggle="collapse" data-bs-target="#businessGroup" aria-expanded="false">
                                <span><i class="bi bi-briefcase me-2"></i>业务模块</span>
                                <i class="bi bi-chevron-down"></i>
                            </div>
                            <div class="collapse" id="businessGroup">
                                <div class="nav-item">
                                    <a class="nav-link" href="{{ url_for('google_sheet.index',version='c3') }}">
                                        <i class="bi bi-table"></i> Google Sheet C3
                                    </a>
                                </div>
                                <div class="nav-item">
                                    <a class="nav-link" href="{{ url_for('google_sheet.index', version='c4') }}">
                                        <i class="bi bi-table"></i> Google Sheet C4
                                    </a>
                                </div>
                                <div class="nav-item">
                                    <a class="nav-link" href="{{ url_for('google_sheet.index', version='c5') }}">
                                        <i class="bi bi-table"></i> Google Sheet C5
                                    </a>
                                </div>
                                <div class="nav-item">
                                    <a class="nav-link" href="{{ url_for('xpl.index') }}">
                                        <i class="bi bi-table"></i> 夏普率计算
                                    </a>
                                </div>
                                <div class="nav-item">
                                    <a class="nav-link" href="{{ url_for('xpl.index_v1') }}">
                                        <i class="bi bi-table"></i> V1 回测数据分析
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- 主内容区域 -->
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 main-content">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        // 侧边栏折叠功能
        document.addEventListener('DOMContentLoaded', function() {
            // 处理分组标题点击事件
            const groupTitles = document.querySelectorAll('.nav-group-title');
            groupTitles.forEach(title => {
                title.addEventListener('click', function() {
                    const chevron = this.querySelector('.bi-chevron-down');
                    const targetId = this.getAttribute('data-bs-target');
                    const target = document.querySelector(targetId);
                    
                    // 切换图标旋转
                    if (target.classList.contains('show')) {
                        chevron.style.transform = 'rotate(-90deg)';
                    } else {
                        chevron.style.transform = 'rotate(0deg)';
                    }
                });
            });
            
            // 监听Bootstrap折叠事件
            const collapseElements = document.querySelectorAll('.collapse');
            collapseElements.forEach(element => {
                element.addEventListener('show.bs.collapse', function() {
                    const groupTitle = document.querySelector(`[data-bs-target="#${this.id}"]`);
                    const chevron = groupTitle.querySelector('.bi-chevron-down');
                    chevron.style.transform = 'rotate(0deg)';
                });
                
                element.addEventListener('hide.bs.collapse', function() {
                    const groupTitle = document.querySelector(`[data-bs-target="#${this.id}"]`);
                    const chevron = groupTitle.querySelector('.bi-chevron-down');
                    chevron.style.transform = 'rotate(-90deg)';
                });
            });
            
            // 保存折叠状态到localStorage
            const saveCollapseState = () => {
                const collapseState = {};
                collapseElements.forEach(element => {
                    collapseState[element.id] = element.classList.contains('show');
                });
                localStorage.setItem('sidebarCollapseState', JSON.stringify(collapseState));
            };
            
            // 恢复折叠状态
            const restoreCollapseState = () => {
                const savedState = localStorage.getItem('sidebarCollapseState');
                if (savedState) {
                    const collapseState = JSON.parse(savedState);
                    Object.keys(collapseState).forEach(elementId => {
                        const element = document.getElementById(elementId);
                        if (!element) return;
                        if (collapseState[elementId]) {
                            element.classList.add('show');
                        } else {
                            element.classList.remove('show');
                        }
                    });
                } else {
                    collapseElements.forEach(element => {
                        element.classList.remove('show');
                    });
                }

                collapseElements.forEach(element => {
                    const groupTitle = document.querySelector(`[data-bs-target="#${element.id}"]`);
                    const chevron = groupTitle ? groupTitle.querySelector('.bi-chevron-down') : null;
                    if (chevron) {
                        chevron.style.transform = element.classList.contains('show') ? 'rotate(0deg)' : 'rotate(-90deg)';
                    }
                });
            };
            
            // 绑定状态保存事件
            collapseElements.forEach(element => {
                element.addEventListener('shown.bs.collapse', saveCollapseState);
                element.addEventListener('hidden.bs.collapse', saveCollapseState);
            });
            
            // 页面加载时恢复状态
            restoreCollapseState();
        });

        // 通用AJAX函数
        function ajaxRequest(url, method, data, callback) {
            const xhr = new XMLHttpRequest();
            xhr.open(method, url, true);
            xhr.setRequestHeader('Content-Type', 'application/json');
            xhr.onreadystatechange = function() {
                if (xhr.readyState !== 4) {
                    return;
                }

                let response = null;
                try {
                    response = xhr.responseText ? JSON.parse(xhr.responseText) : null;
                } catch (e) {
                    response = null;
                }

                if (xhr.status >= 200 && xhr.status < 300) {
                    callback(null, response);
                    return;
                }

                const message = response && response.message
                    ? response.message
                    : `Request failed with status ${xhr.status}`;
                callback(new Error(message), response);
            };
            xhr.send(data ? JSON.stringify(data) : null);
        }

        // 显示通知（统一为右下角弹窗样式）
        function showNotification(message, type = 'info') {
            const alertClass = type === 'error' ? 'alert-danger' : 
                              type === 'success' ? 'alert-success' : 
                              type === 'warning' ? 'alert-warning' : 'alert-info';

            // 创建或获取右下角容器
            let container = document.getElementById('notification-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'notification-container';
                container.style.position = 'fixed';
                container.style.right = '20px';
                container.style.bottom = '20px';
                container.style.zIndex = '2000';
                container.style.display = 'flex';
                container.style.flexDirection = 'column';
                container.style.alignItems = 'flex-end';
                document.body.appendChild(container);
            }

            const alertDiv = document.createElement('div');
            alertDiv.className = `alert ${alertClass} alert-dismissible fade show mb-2`;
            alertDiv.style.minWidth = '260px';
            alertDiv.style.boxShadow = '0 0.25rem 0.5rem rgba(0,0,0,0.15)';
            alertDiv.innerHTML = `
                ${message}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            `;

            container.appendChild(alertDiv);

            // 自动消失
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.remove();
                }
            }, 5000);
        }

        // 格式化时间
        function formatTime(timestamp) {
            if (!timestamp) return '-';
            const date = new Date(timestamp);
            return date.toLocaleString('zh-CN');
        }

        // 获取任务状态文本
        function getStatusText(status) {
            switch (status) {
                case 'pending': return '待执行';
                case 'running': return '执行中';
                case 'completed': return '已完成';
                case 'cancelled': return '已取消';
                case 'error': return '执行出错';
                default: return status;
            }
        }

        // 获取任务状态类
        function getStatusClass(status) {
            switch (status) {
                case 'pending': return 'badge bg-secondary';
                case 'running': return 'badge bg-warning';
                case 'completed': return 'badge bg-success';
                case 'cancelled': return 'badge bg-info';
                case 'error': return 'badge bg-danger';
                default: return 'badge bg-secondary';
            }
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
