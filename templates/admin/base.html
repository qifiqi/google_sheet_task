<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Jaspil 任务管理系统{% endblock %}</title>

    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='font/bootstrap-icons.css') }}" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/template-auth.css') }}" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

    <style>
        :root {
            --bs-secondary-color: rgba(33, 37, 41, 0.75);
            --bs-tertiary-bg: #f8f9fa;
            --bs-emphasis-color: #000;
        }
        html[data-bs-theme="dark"] {
            --bs-body-color: #e5e7eb;
            --bs-body-bg: #111827;
            --bs-border-color: #334155;
            --bs-secondary-color: #94a3b8;
            --bs-tertiary-bg: #1f2937;
            --bs-emphasis-color: #f8fafc;
        }
        .text-body {
            color: var(--bs-body-color) !important;
        }
        .text-body-secondary {
            color: var(--bs-secondary-color) !important;
        }
        .bg-body {
            background-color: var(--bs-body-bg) !important;
        }
        .bg-body-tertiary {
            background-color: var(--bs-tertiary-bg) !important;
        }
        body {
            background-color: #f8f9fa;
        }
        html[data-bs-theme="dark"] body {
            background-color: #111827;
            color: #e5e7eb;
        }
        .sidebar {
            min-height: 100vh;
            background: #ffffff;
            overflow-y: scroll;
            overflow-x: hidden;
            border-right: 1px solid #e9ecef;
            box-shadow: inset -1px 0 0 rgba(0, 0, 0, 0.04);
            scrollbar-gutter: stable;
            flex: 0 0 auto;
        }
        html[data-bs-theme="dark"] .sidebar {
            background: #111827;
            border-right-color: #243041;
            box-shadow: inset -1px 0 0 rgba(255, 255, 255, 0.04);
        }
        .sidebar-brand-icon {
            width: 2.5rem;
            height: 2.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.85rem;
            background: linear-gradient(135deg, #0d6efd 0%, #4dabf7 100%);
            color: #fff;
            font-size: 1.1rem;
            box-shadow: 0 10px 20px rgba(13, 110, 253, 0.18);
        }
        .sidebar .nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: #495057;
            padding: 0.65rem 0.85rem;
            border-radius: 0.75rem;
            margin-bottom: 0.2rem;
            font-weight: 500;
            transition: all 0.18s ease;
        }
        html[data-bs-theme="dark"] .sidebar .nav-link {
            color: #d1d5db;
        }
        .sidebar .nav-link:hover {
            color: #0d6efd;
            background-color: #f1f5ff;
        }
        html[data-bs-theme="dark"] .sidebar .nav-link:hover {
            color: #93c5fd;
            background-color: rgba(59, 130, 246, 0.14);
        }
        .sidebar .nav-link.active {
            color: #0d6efd;
            background-color: #e7f1ff;
            box-shadow: inset 0 0 0 1px rgba(13, 110, 253, 0.12);
        }
        html[data-bs-theme="dark"] .sidebar .nav-link.active {
            color: #bfdbfe;
            background-color: rgba(59, 130, 246, 0.18);
            box-shadow: inset 0 0 0 1px rgba(96, 165, 250, 0.2);
        }
        .sidebar .btn-toggle {
            width: 100%;
            border: 0;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #343a40;
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 0.8rem 0.85rem 0.55rem;
            border-radius: 0.75rem;
            transition: background-color 0.18s ease, color 0.18s ease;
        }
        html[data-bs-theme="dark"] .sidebar .btn-toggle {
            color: #e5e7eb;
        }
        .sidebar .btn-toggle:hover {
            background: #f8f9fa;
            color: #0d6efd;
        }
        html[data-bs-theme="dark"] .sidebar .btn-toggle:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #93c5fd;
        }
        .sidebar .btn-toggle-icon {
            transition: transform 0.2s ease;
            color: #868e96;
            font-size: 0.9rem;
        }
        html[data-bs-theme="dark"] .sidebar .btn-toggle-icon {
            color: #94a3b8;
        }
        .sidebar .btn-toggle[aria-expanded="true"] .btn-toggle-icon {
            transform: rotate(90deg);
            color: #0d6efd;
        }
        html[data-bs-theme="dark"] .sidebar .btn-toggle[aria-expanded="true"] .btn-toggle-icon {
            color: #93c5fd;
        }
        .sidebar .btn-toggle-nav {
            padding-left: 0;
            margin: 0.1rem 0 0;
            list-style: none;
            padding-left: 0.15rem;
        }
        .sidebar .btn-toggle-nav li {
            margin: 0;
        }
        .sidebar .btn-toggle-nav .nav-link {
            margin-left: 0.25rem;
            padding: 0.48rem 0.75rem 0.48rem 0.85rem;
            white-space: nowrap;
            font-size: 0.93rem;
            font-weight: 500;
            border-radius: 0.7rem;
        }
        .sidebar .btn-toggle-nav .nav-link i {
            font-size: 0.92rem;
            opacity: 0.9;
        }
        .sidebar .btn-toggle-nav .nav-link span {
            font-size: 0.93rem;
        }
        .main-content {
            min-width: 0;
        }

        @media (min-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0;
                bottom: 0;
                left: 0;
                z-index: 1000;
                width: 25%;
                max-width: 25%;
            }
            .main-content {
                margin-left: 25%;
            }
        }

        @media (min-width: 992px) {
            .sidebar {
                width: 16.666667%;
                max-width: 16.666667%;
            }
            .main-content {
                margin-left: 16.666667%;
            }
        }
        .sidebar::-webkit-scrollbar {
            width: 10px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #ced4da;
            border-radius: 999px;
            border: 2px solid #ffffff;
        }
        .sidebar::-webkit-scrollbar-thumb:hover {
            background: #adb5bd;
        }
        .sidebar-user-avatar {
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: 700;
            font-size: 1rem;
            background: linear-gradient(135deg, #fb7185 0%, #8b5cf6 100%);
            box-shadow: 0 10px 20px rgba(139, 92, 246, 0.18);
            flex-shrink: 0;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            border: 1px solid rgba(0, 0, 0, 0.125);
        }
        html[data-bs-theme="dark"] .card {
            background-color: #182132;
            border-color: #2a3648;
            color: #e5e7eb;
        }
        html[data-bs-theme="dark"] .table {
            --bs-table-color: #e5e7eb;
            --bs-table-bg: transparent;
            --bs-table-border-color: #334155;
            --bs-table-striped-color: #e5e7eb;
            --bs-table-striped-bg: rgba(148, 163, 184, 0.05);
            --bs-table-active-color: #f8fafc;
            --bs-table-active-bg: rgba(59, 130, 246, 0.12);
            --bs-table-hover-color: #f8fafc;
            --bs-table-hover-bg: rgba(59, 130, 246, 0.08);
            color: #e5e7eb;
        }
        html[data-bs-theme="dark"] .table > :not(caption) > * > * {
            color: inherit;
        }
        html[data-bs-theme="dark"] .table thead,
        html[data-bs-theme="dark"] .table-light,
        html[data-bs-theme="dark"] .bg-white {
            background-color: #182132 !important;
            color: #e5e7eb !important;
        }
        html[data-bs-theme="dark"] .table-light > :not(caption) > * > *,
        html[data-bs-theme="dark"] .table > thead > tr > th {
            background-color: #182132 !important;
            color: #e5e7eb !important;
            border-bottom-color: #334155 !important;
        }
        html[data-bs-theme="dark"] .table code {
            color: #f9a8d4;
        }
        html[data-bs-theme="dark"] .table .text-dark {
            color: #e5e7eb !important;
        }
        html[data-bs-theme="dark"] .bg-light,
        html[data-bs-theme="dark"] .alert-light {
            background-color: #1f2937 !important;
            color: #e5e7eb !important;
            border-color: #334155 !important;
        }
        html[data-bs-theme="dark"] .dropdown-menu {
            background-color: #182132;
            border-color: #2a3648;
        }
        html[data-bs-theme="dark"] .dropdown-item {
            color: #e5e7eb;
        }
        html[data-bs-theme="dark"] .dropdown-item:hover,
        html[data-bs-theme="dark"] .dropdown-item:focus {
            color: #f8fafc;
            background-color: rgba(59, 130, 246, 0.12);
        }
        html[data-bs-theme="dark"] .dropdown-divider {
            border-top-color: #334155;
        }
        html[data-bs-theme="dark"] .text-muted {
            color: #94a3b8 !important;
        }
        html[data-bs-theme="dark"] .form-control,
        html[data-bs-theme="dark"] .form-select,
        html[data-bs-theme="dark"] .input-group-text,
        html[data-bs-theme="dark"] textarea.form-control {
            background-color: #111827 !important;
            border-color: #334155 !important;
            color: #e5e7eb !important;
        }
        html[data-bs-theme="dark"] .form-control:focus,
        html[data-bs-theme="dark"] .form-select:focus,
        html[data-bs-theme="dark"] textarea.form-control:focus {
            background-color: #0f172a !important;
            border-color: #3b82f6 !important;
            color: #f8fafc !important;
            box-shadow: 0 0 0 0.2rem rgba(59, 130, 246, 0.18) !important;
        }
        html[data-bs-theme="dark"] .form-control::placeholder,
        html[data-bs-theme="dark"] textarea.form-control::placeholder {
            color: #7c8aa0 !important;
        }
        html[data-bs-theme="dark"] .form-select option {
            background-color: #111827;
            color: #e5e7eb;
        }
        html[data-bs-theme="dark"] .input-group-text {
            color: #94a3b8 !important;
        }
        html[data-bs-theme="dark"] .text-bg-light,
        html[data-bs-theme="dark"] .badge.text-bg-light {
            background-color: #1e293b !important;
            color: #e5e7eb !important;
            border-color: #334155 !important;
        }
        html[data-bs-theme="dark"] .list-group-item {
            background-color: #111827;
            color: #e5e7eb;
            border-color: #334155;
        }
        html[data-bs-theme="dark"] .list-group-item.active {
            background-color: rgba(59, 130, 246, 0.18);
            border-color: #3b82f6;
            color: #f8fafc;
        }
        html[data-bs-theme="dark"] .card-header.border-0 {
            border-bottom: 1px solid rgba(148, 163, 184, 0.12) !important;
        }
        .log-container {
            height: 400px;
            overflow-y: auto;
            overflow-x: auto;
            background-color: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            font-family: 'Courier New', monospace;
            border-radius: 0.375rem;
            font-size: 14px;
            white-space: pre;
            word-break: normal;
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="template-auth-pending" data-auth-enabled="{{ 'true' if auth_enabled else 'false' }}">
    <div class="template-auth-loading" id="templateAuthLoading">
        <div class="template-auth-loading__card">
            <div class="spinner-border text-primary" role="status" aria-hidden="true"></div>
            <div class="template-auth-loading__label" id="templateAuthLoadingLabel">正在恢复登录状态...</div>
        </div>
    </div>

    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse">
                <div class="position-sticky d-flex flex-column min-vh-100 px-3 pt-4 pb-3">
                    <div class="d-flex align-items-center gap-3 px-2 pb-3 mb-3 border-bottom">
                        <div class="sidebar-brand-icon">
                            <i class="bi bi-grid-1x2-fill"></i>
                        </div>
                        <div>
                            <p class="mb-0 fw-bold text-body">Jaspil 任务平台</p>
                            <p class="mb-0 mt-1 small text-muted">Operations Platform</p>
                        </div>
                    </div>
                    <div class="nav flex-column flex-grow-1" id="templateSidebarMenu"></div>
                    <div class="mt-3 pt-3 border-top flex-shrink-0">
                        <div class="dropup">
                            <button class="btn btn-link dropdown-toggle d-flex align-items-center gap-2 w-100 px-0 py-1 text-start text-decoration-none text-reset border-0 shadow-none" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                <div class="sidebar-user-avatar" data-template-auth-avatar>AI</div>
                                <div class="flex-grow-1 min-w-0">
                                    <div class="fw-semibold text-truncate" data-template-auth-username>占位用户</div>
                                    <div class="small text-muted text-truncate" data-template-auth-role>Jaspil 用户</div>
                                </div>
                            </button>
                            <ul class="dropdown-menu w-100 shadow">
                                <li>
                                    <button type="button" class="dropdown-item d-flex align-items-center gap-2" data-template-theme-trigger>
                                        <i class="bi bi-circle-half" data-template-theme-icon></i>
                                        <span data-template-theme-toggle>切换主题</span>
                                    </button>
                                </li>
                                <li><hr class="dropdown-divider"></li>
                                <li><button type="button" class="dropdown-item text-danger" data-template-auth-logout>退出登录</button></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 py-4 px-3 px-md-4 main-content" data-template-main-content>
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/template-auth.js') }}?v=20260415_page_scope"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const sidebarMenu = document.getElementById('templateSidebarMenu');

            function syncToggleState(element, expanded) {
                if (!element) {
                    return;
                }
                const toggle = document.querySelector(`[data-bs-target="#${element.id}"]`);
                if (toggle) {
                    toggle.setAttribute('aria-expanded', expanded ? 'true' : 'false');
                }
            }

            function saveCollapseState() {
                const collapseElements = sidebarMenu ? Array.from(sidebarMenu.querySelectorAll('.collapse')) : [];
                const collapseState = {};
                collapseElements.forEach((element) => {
                    collapseState[element.id] = element.classList.contains('show');
                });
                localStorage.setItem('sidebarCollapseState', JSON.stringify(collapseState));
            }

            function restoreCollapseState() {
                const collapseElements = sidebarMenu ? Array.from(sidebarMenu.querySelectorAll('.collapse')) : [];
                const savedState = localStorage.getItem('sidebarCollapseState');
                if (savedState) {
                    const collapseState = JSON.parse(savedState);
                    Object.keys(collapseState).forEach((elementId) => {
                        const element = document.getElementById(elementId);
                        if (!element) {
                            return;
                        }
                        if (collapseState[elementId]) {
                            element.classList.add('show');
                            syncToggleState(element, true);
                        } else {
                            element.classList.remove('show');
                            syncToggleState(element, false);
                        }
                    });
                    return;
                }

                collapseElements.forEach((element) => {
                    const hasActiveLink = element.querySelector('.nav-link.active');
                    const shouldShow = Boolean(hasActiveLink);
                    element.classList.toggle('show', shouldShow);
                    syncToggleState(element, shouldShow);
                });
            }

            const observer = new MutationObserver(function() {
                const collapseElements = sidebarMenu ? Array.from(sidebarMenu.querySelectorAll('.collapse')) : [];
                collapseElements.forEach((element) => {
                    if (element.dataset.boundCollapseEvents === 'true') {
                        return;
                    }
                    element.dataset.boundCollapseEvents = 'true';
                    element.addEventListener('shown.bs.collapse', saveCollapseState);
                    element.addEventListener('hidden.bs.collapse', saveCollapseState);
                    syncToggleState(element, element.classList.contains('show'));
                });
                restoreCollapseState();
            });

            if (sidebarMenu) {
                observer.observe(sidebarMenu, { childList: true, subtree: true });
            }
        });
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
