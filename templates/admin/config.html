{% extends "admin/base.html" %}

{% block title %}系统配置 - 任务管理系统{% endblock %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">系统配置</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <div class="btn-group me-2">
            <button type="button" class="btn btn-sm btn-outline-secondary" onclick="loadConfig()">
                <i class="bi bi-arrow-clockwise"></i> 刷新
            </button>
        </div>
        <div class="btn-group me-2">
            <button type="button" class="btn btn-sm btn-outline-info" onclick="validateConfig()">
                <i class="bi bi-check2-square"></i> 验证配置
            </button>
        </div>
    </div>
</div>

<!-- 配置表单 -->
<div class="row">
    <div class="col-12">
        <div class="card">
            <div class="card-header">
                <h5 class="card-title mb-0">
                    <i class="bi bi-gear"></i> 配置列表
                </h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead>
                            <tr>
                                <th style="width: 25%">Key</th>
                                <th style="width: 35%">Value</th>
                                <th style="width: 30%">介绍</th>
                                <th style="width: 10%">操作</th>
                            </tr>
                        </thead>
                        <tbody id="configs-table-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="editConfigModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">编辑配置</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">Key</label>
                    <input type="text" class="form-control" id="edit-config-key" disabled>
                </div>
                <div class="mb-3">
                    <label class="form-label">Value</label>
                    <textarea class="form-control" id="edit-config-value" rows="6" placeholder="请输入配置值"></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">介绍</label>
                    <textarea class="form-control" id="edit-config-description" rows="4" placeholder="请输入介绍"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" id="edit-config-save-btn">保存</button>
            </div>
        </div>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script>
    // 页面加载完成后获取配置
    document.addEventListener('DOMContentLoaded', function() {
        loadConfig();
    });

    function loadConfig() {
        try {
            ajaxRequest('/api/system-configs', 'GET', null, function(err, data) {
                if (!err && data && data.status === 'success') {
                    renderConfigTable(data.configs || []);
                    showNotification('配置加载成功', 'success');
                } else {
                    showNotification('加载配置失败: ' + (data ? data.message : '网络错误'), 'error');
                }
            });
        } catch (e) {
            showNotification('加载配置时出错: ' + e.message, 'error');
        }
    }

    function escapeHtml(text) {
        if (text === null || text === undefined) {
            return '';
        }
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function renderConfigTable(configs) {
        const tbody = document.getElementById('configs-table-body');
        tbody.innerHTML = '';

        configs.forEach(function(c) {
            const tr = document.createElement('tr');

            const tdKey = document.createElement('td');
            tdKey.innerHTML = `<code>${escapeHtml(c.key)}</code>`;

            const tdValue = document.createElement('td');
            tdValue.style.whiteSpace = 'pre-wrap';
            tdValue.style.wordBreak = 'break-word';
            tdValue.innerHTML = `${escapeHtml(c.value)}`;

            const tdDesc = document.createElement('td');
            tdDesc.style.whiteSpace = 'pre-wrap';
            tdDesc.style.wordBreak = 'break-word';
            tdDesc.innerHTML = `${escapeHtml(c.description)}`;

            const tdAction = document.createElement('td');
            const btn = document.createElement('button');
            btn.className = 'btn btn-sm btn-primary';
            btn.type = 'button';
            btn.textContent = '编辑';

            btn.dataset.key = c.key || '';
            btn.dataset.value = c.value || '';
            btn.dataset.description = c.description || '';
            btn.addEventListener('click', function() {
                openEditModal(btn);
            });

            tdAction.appendChild(btn);

            tr.appendChild(tdKey);
            tr.appendChild(tdValue);
            tr.appendChild(tdDesc);
            tr.appendChild(tdAction);
            tbody.appendChild(tr);
        });
    }

    function openEditModal(btn) {
        const key = (btn.dataset && btn.dataset.key) ? btn.dataset.key : '';
        const value = (btn.dataset && btn.dataset.value) ? btn.dataset.value : '';
        const description = (btn.dataset && btn.dataset.description) ? btn.dataset.description : '';

        document.getElementById('edit-config-key').value = key;
        document.getElementById('edit-config-value').value = value;
        document.getElementById('edit-config-description').value = description;

        const modalEl = document.getElementById('editConfigModal');
        const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
        modal.show();
    }

    function saveEditedConfig() {
        const key = document.getElementById('edit-config-key').value;
        const value = document.getElementById('edit-config-value').value;
        const description = document.getElementById('edit-config-description').value;

        ajaxRequest(`/api/system-configs/${encodeURIComponent(key)}`, 'PUT', {
            value: value,
            description: description
        }, function(err, data) {
            if (!err && data && data.status === 'success') {
                showNotification('配置更新成功', 'success');
                const modalEl = document.getElementById('editConfigModal');
                const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
                modal.hide();
                setTimeout(function() {
                    loadConfig();
                }, 300);
            } else {
                showNotification('配置更新失败: ' + (data ? data.message : '未知错误'), 'error');
            }
        });
    }

    document.addEventListener('DOMContentLoaded', function() {
        const btn = document.getElementById('edit-config-save-btn');
        if (btn) {
            btn.addEventListener('click', saveEditedConfig);
        }
    });

    function validateConfig() {
        console.log('开始验证配置...');
        ajaxRequest('/api/config/validate', 'GET', null, function(err, data) {
            if (!err && data && data.status === 'success') {
                const validation = data.validation;
                console.log('配置验证结果:', validation);
                
                let message = `配置验证结果:\n`;
                message += `数据库配置数量: ${validation.db_size}\n`;
                message += `缓存配置数量: ${validation.cache_size}\n`;
                message += `Google Sheet配置: ${JSON.stringify(validation.google_sheet_config, null, 2)}`;
                
                alert(message);
                showNotification('配置验证完成，请查看控制台详细信息', 'info');
            } else {
                console.error('配置验证失败:', err, data);
                showNotification('配置验证失败: ' + (data ? data.message : '未知错误'), 'error');
            }
        });
    }
</script>
{% endblock %}
