name: google-sheet-validator-db

services:
  postgres:
    image: postgres:16
    container_name: google-sheet-validator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: googlesheet_validator
      POSTGRES_USER: validator_user
      POSTGRES_PASSWORD: validator_password
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U validator_user -d googlesheet_validator"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
