<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="430" viewBox="0 0 1180 430" role="img" aria-labelledby="title desc">
  <title id="title">多品全局预览比例区方案三</title>
  <desc id="desc">比例清单布局，产品按行展示，适合很多产品时编辑比例。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1180" height="430" fill="#f6f8fb"/>
  <text x="40" y="42" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700">方案三：比例清单</text>
  <text x="40" y="72" fill="#64748b" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">适合产品很多的任务；产品比例按行编辑，可固定高度滚动，顶部直接提示比例计算公式。</text>

  <rect x="40" y="104" width="1100" height="262" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <g transform="translate(64 128)">
    <rect width="280" height="42" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="16" y="27" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="15">参数方案 1（2 个产品结果）</text>
    <path d="M252 19 l6 6 l6 -6" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <rect x="306" y="-2" width="462" height="46" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="322" y="18" fill="#9a3412" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700">比例计算：</text>
    <text x="392" y="18" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">每个产品的指数/结果值 × 比例 ÷ 100 后求和</text>
    <text x="322" y="36" fill="#64748b" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">不可解析或缺失显示 “-”；修改比例后先计算预览，再保存比例。</text>
    <rect x="792" y="0" width="124" height="42" rx="21" fill="#0d6efd"/>
    <text x="824" y="27" fill="#ffffff" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700">计算预览</text>
    <text x="936" y="27" fill="#047857" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14" font-weight="700">合计 100%</text>
  </g>

  <g transform="translate(64 190)">
    <rect width="1052" height="132" rx="14" fill="#f8fafc" stroke="#e2e8f0"/>
    <rect width="1052" height="36" rx="14" fill="#eef4fb"/>
    <text x="20" y="23" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700">产品</text>
    <text x="520" y="23" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700">比例</text>
    <text x="760" y="23" fill="#475569" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700">状态</text>

    <line x1="0" y1="80" x2="1052" y2="80" stroke="#e2e8f0"/>
    <text x="20" y="62" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">纳斯达克100ETF-Invesco</text>
    <rect x="520" y="48" width="180" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="536" y="67" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">30</text>
    <rect x="700" y="48" width="34" height="28" rx="8" fill="#e9eef6" stroke="#cbd5e1"/>
    <text x="712" y="67" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">%</text>
    <text x="760" y="66" fill="#047857" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">参与计算</text>

    <text x="20" y="108" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">谷歌-A</text>
    <rect x="520" y="94" width="180" height="28" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="536" y="113" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">70</text>
    <rect x="700" y="94" width="34" height="28" rx="8" fill="#e9eef6" stroke="#cbd5e1"/>
    <text x="712" y="113" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">%</text>
    <text x="760" y="112" fill="#047857" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">参与计算</text>
  </g>

  <rect x="1068" y="204" width="8" height="104" rx="4" fill="#cbd5e1"/>
  <rect x="1068" y="224" width="8" height="34" rx="4" fill="#64748b"/>

  <text x="64" y="398" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">优点：很多产品时最稳，编辑扫描效率高；可以给清单设最大高度，内部滚动。</text>
  <text x="64" y="422" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">注意：视觉上没卡片活泼，但对 10+ 产品最实用。</text>
</svg>
