<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="340" viewBox="0 0 1180 340" role="img" aria-labelledby="title desc">
  <title id="title">顶部卡片方案二：分层标题</title>
  <desc id="desc">上层大标题+副标题，下层操作按钮独立一行，视觉层次清晰。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1180" height="340" fill="#f6f8fb"/>
  <text x="40" y="42" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700">方案二：分层标题</text>
  <text x="40" y="72" fill="#64748b" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">标题区和操作区分两行，标题更突出，操作按钮左对齐形成工具条。</text>

  <!-- card -->
  <rect x="40" y="100" width="1100" height="130" rx="18" fill="#ffffff" filter="url(#shadow)"/>
  <g transform="translate(64 120)">
    <!-- row 1: title -->
    <text x="0" y="18" fill="#64748b" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">多品数据回测</text>
    <text x="0" y="44" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="20" font-weight="700">全局预览页</text>
    <text x="130" y="44" fill="#64748b" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">纳斯达克+谷歌 · 2025-01-01 ~ 2025-05-01</text>

    <!-- divider -->
    <line x1="0" y1="60" x2="1052" y2="60" stroke="#e2e8f0"/>

    <!-- row 2: action buttons left-aligned -->
    <rect x="0" y="70" width="90" height="32" rx="16" fill="#ffffff" stroke="#0d6efd"/>
    <text x="14" y="91" fill="#0d6efd" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">保存比例</text>

    <rect x="102" y="70" width="96" height="32" rx="16" fill="#ffffff" stroke="#198754"/>
    <text x="114" y="91" fill="#198754" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">导出 XLSX</text>

    <rect x="210" y="70" width="90" height="32" rx="16" fill="#ffffff" stroke="#6c757d"/>
    <text x="222" y="91" fill="#6c757d" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">返回详情</text>
  </g>

  <text x="64" y="274" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">优点：层次分明，标题醒目，按钮不会和标题挤在一起；适合任务名较长的场景。</text>
  <text x="64" y="300" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">注意：比方案一多占约 40px 高度。</text>
</svg>
