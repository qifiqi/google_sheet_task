<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="300" viewBox="0 0 1180 300" role="img" aria-labelledby="title desc">
  <title id="title">顶部卡片方案三：面包屑极简</title>
  <desc id="desc">用面包屑导航替代大标题，操作按钮右浮，整体极简。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect width="1180" height="300" fill="#f6f8fb"/>
  <text x="40" y="42" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="22" font-weight="700">方案三：面包屑极简</text>
  <text x="40" y="72" fill="#64748b" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">无卡片包裹，面包屑导航 + 任务名 + 右侧图标按钮，最小化头部占用。</text>

  <!-- thin bar background -->
  <rect x="40" y="100" width="1100" height="44" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <g transform="translate(64 108)">
    <!-- breadcrumb -->
    <text x="0" y="22" fill="#0d6efd" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">多品回测</text>
    <text x="56" y="22" fill="#94a3b8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">/</text>
    <text x="68" y="22" fill="#0d6efd" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">纳斯达克+谷歌</text>
    <text x="168" y="22" fill="#94a3b8" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13">/</text>
    <text x="180" y="22" fill="#0f172a" font-family="Microsoft YaHei, Arial, sans-serif" font-size="13" font-weight="700">全局预览</text>
    <text x="250" y="22" fill="#64748b" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">2025-01-01 ~ 2025-05-01</text>

    <!-- right: icon buttons -->
    <rect x="880" y="2" width="32" height="28" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="889" y="21" fill="#0d6efd" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">S</text>

    <rect x="920" y="2" width="32" height="28" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="929" y="21" fill="#198754" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">E</text>

    <rect x="960" y="2" width="32" height="28" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="968" y="21" fill="#6c757d" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">&lt;</text>
  </g>

  <!-- legend -->
  <g transform="translate(64 170)">
    <text x="0" y="0" fill="#64748b" font-family="Microsoft YaHei, Arial, sans-serif" font-size="12">图标说明：S = 保存比例　E = 导出 XLSX　&lt; = 返回详情</text>
  </g>

  <text x="64" y="220" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">优点：头部仅 44px，几乎不占空间；面包屑提供导航上下文；图标按钮 hover 显示 tooltip。</text>
  <text x="64" y="246" fill="#334155" font-family="Microsoft YaHei, Arial, sans-serif" font-size="14">注意：图标需要 tooltip 辅助理解；首次使用可能不够直观。</text>
</svg>
