    <rect x="258" y="636" width="764" height="104" rx="0" fill="#f8fafc"/>
    <text x="300" y="678" fill="#475569" font-family="Microsoft YaHei, sans-serif" font-size="14">导出内容：每个任务一个全局预览 XLSX，最终打包为 ZIP。</text>
    <rect x="740" y="660" width="82" height="40" rx="20" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="765" y="685" fill="#334155" font-family="Microsoft YaHei, sans-serif" font-size="14">取消</text>
    <rect x="838" y="660" width="122" height="40" rx="20" fill="#16a34a"/>
    <text x="865" y="685" fill="#ffffff" font-family="Microsoft YaHei, sans-serif" font-size="14" font-weight="700">导出 ZIP</text>
  </g>
</svg>
